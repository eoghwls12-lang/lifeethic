<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>생활과 윤리: 수능 심화 마스터</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; }
        .quiz-container { max-width: 850px; margin: 2rem auto; background: white; padding: 2.5rem; border-radius: 1.5rem; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); }
        .hidden { display: none; }
        .correct { color: #10b981; font-weight: bold; }
        .wrong { color: #ef4444; font-weight: bold; }
        .choice-label:hover { background-color: #f1f5f9; }
    </style>
</head>
<body class="p-4">

    <div class="quiz-container">
        <header class="text-center mb-10 border-b-2 border-indigo-100 pb-6">
            <span class="bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full text-sm font-bold uppercase tracking-wide">High Level Ethics</span>
            <h1 class="text-3xl font-bold text-slate-800 mt-3">수능 1등급 도전: 사회계약 & 시민불복종</h1>
            <p class="text-slate-500 mt-2">평가원 기출 변형 및 고난도 심화 선지 수록</p>
        </header>

        <div id="quiz-screen">
            <!-- OX Questions -->
            <section class="mb-12">
                <h2 class="text-xl font-bold mb-6 flex items-center gap-2 text-slate-800">
                    <span class="bg-indigo-600 text-white w-8 h-8 flex items-center justify-center rounded-lg">1</span>
                    PART 1. 킬러 선지 진위 판정 (OX)
                </h2>
                <div id="ox-questions" class="space-y-4"></div>
            </section>

            <!-- Multiple Choice -->
            <section class="mb-12">
                <h2 class="text-xl font-bold mb-6 flex items-center gap-2 text-slate-800">
                    <span class="bg-indigo-600 text-white w-8 h-8 flex items-center justify-center rounded-lg">2</span>
                    PART 2. 수능형 5지선다 심화
                </h2>
                <div id="mc-questions" class="space-y-10"></div>
            </section>

            <div class="flex justify-center mt-12">
                <button onclick="submitQuiz()" class="bg-indigo-600 text-white px-10 py-4 rounded-xl font-bold text-lg hover:bg-indigo-700 shadow-lg hover:shadow-indigo-200 transition-all">답안지 제출하기</button>
            </div>
        </div>

        <div id="result-screen" class="hidden">
            <div class="text-center mb-10">
                <h2 class="text-2xl font-bold text-slate-700">분석 결과</h2>
                <div id="score-display" class="text-7xl font-black text-indigo-600 my-6">0 / 100</div>
                <div id="grade-badge" class="inline-block px-4 py-2 rounded-lg bg-indigo-50 text-indigo-700 font-bold text-xl mb-4"></div>
                <p id="grade-comment" class="text-slate-600"></p>
            </div>
            
            <div id="review-section" class="space-y-6 mb-10 border-t pt-10">
                <!-- 해설이 들어갈 자리 -->
            </div>

            <div class="flex justify-center">
                <button onclick="resetQuiz()" class="bg-slate-800 text-white px-10 py-4 rounded-xl font-bold hover:bg-black transition-all">오답 정리 후 다시 풀기</button>
            </div>
        </div>
    </div>

    <script>
        const oxData = [
            { q: "홉스(Hobbes): 자연 상태에서 개인은 자신의 생명을 보존하기 위해 타인의 신체에 대한 권리를 갖지 못한다.", a: false, e: "홉스에 따르면 자연 상태에서 인간은 자기 보존을 위해 '모든 것에 대한 권리(Right to everything)', 즉 타인의 신체에 대한 권리까지도 갖습니다." },
            { q: "로크(Locke): 자연법이 집행되지 않는 상태를 해결하기 위해 입법권과 집행권을 특정 주체에게 전적으로 양도한다.", a: false, e: "로크는 전적 양도가 아닌 '신탁(Trust)'을 강조하며, 권력을 분립(입법권 우위)시켜야 한다고 보았습니다." },
            { q: "루소(Rousseau): 사회 계약을 통해 형성된 주권은 결코 타인에게 양도될 수도, 대표될 수도 없다.", a: true, e: "루소는 주권의 핵심인 '일반의지'는 성질상 대표되거나 양도될 수 없다고 보아 직접 민주주의를 옹호했습니다." },
            { q: "소로(Thoreau): 정의롭지 못한 법이 존재할 때, 우리는 투표를 통해 다수를 설득할 때까지 그 법을 준수해야 한다.", a: false, e: "소로는 부당한 법의 도구가 되지 말 것을 강조하며, 법을 고칠 때까지 기다리기보다 '즉각적인' 불복종을 주장했습니다." },
            { q: "롤스(Rawls): 시민불복종은 헌법의 근거가 되는 정의의 원칙에 의해 정당화되는 정치적 행위이다.", a: true, e: "롤스는 시민불복종을 '공유된 정의감' 혹은 '헌법적 원칙'에 호소하는 정치적 행위로 규정했습니다." },
            { q: "싱어(Singer): 시민불복종은 사회적 유용성을 증진시키기 위한 수단이므로 항상 폭력적 수단도 허용된다.", a: false, e: "싱어 역시 결과적 유용성을 중시하지만, 불복종이 가져올 부정적 파급효과(무질서 등)를 최소화하기 위해 기본적으로 비폭력을 견지합니다." },
            { q: "로크(Locke): 국가 권력의 정당성은 통치자의 의지가 아니라 피치자의 동의로부터 나온다.", a: true, e: "사회계약론의 공통점으로, 권력은 구성원들의 합의와 동의에 기초합니다." },
            { q: "롤스(Rawls): 다수자의 정의감이 현저히 위반되었을 때에만 시민불복종이 정당화될 수 있다.", a: true, e: "롤스는 모든 불의가 아니라 '심대하고 명백한 불의'가 있을 때(제1원칙과 제2원칙 중 기회 균등의 원칙 위반)를 대상으로 합니다." },
            { q: "홉스(Hobbes): 국가가 개인의 자기 보존을 보장하지 못할 경우에도 신민은 저항할 수 없다.", a: false, e: "홉스조차도 국가가 개인의 생명(자기보존)을 위협하거나 보호하지 못할 때는 계약의 목적이 상실된 것이므로 저항하거나 복종을 거부할 수 있다고 보았습니다." },
            { q: "루소(Rousseau): 개별 의지들의 단순한 총합인 '전체 의지'가 국가 운영의 원리가 되어야 한다.", a: false, e: "국가 운영의 원리는 사적 이익을 배제한 공동의 이익을 추구하는 '일반의지'여야 합니다." }
        ];

        const mcData = [
            {
                q: "사회계약론자 가, 나의 입장에 대한 설명으로 적절한 것은?<br><br><b>가:</b> 국가는 하나의 거대한 리바이어던이다. 사람들은 공포로부터 벗어나기 위해 자신의 모든 권리를 군주에게 양도한다.<br><b>나:</b> 입법권이 신탁을 위반하여 인민의 재산을 침해한다면, 인민은 그 권력을 제거할 최고의 권리를 갖는다.",
                o: ["가: 주권자는 사회 계약의 직접적인 당사자로서 평화 유지의 의무를 진다.", "나: 자연 상태는 전쟁 상태와 동일하므로 시민들은 저항권을 가질 수 없다.", "가, 나: 국가 성립 이전에도 인간은 사회를 이루며 도덕적으로 완벽하게 생활한다.", "나: 입법권은 국가의 최고 권력이지만 시민의 동의 없이는 조세를 징수할 수 없다.", "가: 개인의 자유로운 의지에 근거한 계약은 군주의 절대권력을 제한하기 위한 것이다."],
                a: 3,
                e: "로크(나)는 입법권 우위를 인정하면서도 사유재산 보호를 위해 '동의 없는 조세 징수'를 금지했습니다. (1번: 홉스의 주권자는 제3자로 계약 당사자가 아님)"
            },
            {
                q: "롤스(Rawls)의 시민불복종론에 대한 다음 설명 중 '틀린' 것은?",
                o: ["시민불복종은 법에 대한 불복종이지만, 동시에 법에 대한 충실성을 나타내는 행위이다.", "차등의 원칙(최소 수혜자 배려)의 위반은 시민불복종의 주요한 직접적 대상이 된다.", "시민불복종은 공공적이고 비폭력적이며 양심적인 정치적 행위여야 한다.", "거의 정의로운 사회에서 체제의 합법성을 인정하는 시민들에 의해 수행된다.", "법에 대한 처벌을 감수함으로써 법에 대한 존중심을 표현한다."],
                a: 1,
                e: "롤스는 '제1원칙(평등한 자유)'과 '제2원칙 중 기회 균등의 원칙' 위반은 불복종의 대상이지만, '차등의 원칙' 위반은 판단이 복잡하여 불복종의 직접적 근거로 삼기 어렵다고 보았습니다. (중요 기출 포인트)"
            },
            {
                q: "시민불복종에 관한 사상가 A, B의 입장을 비교한 것으로 옳은 것은?<br><br><b>A:</b> 우리가 먼저 되어야 할 것은 국민이기보다는 인간이어야 한다. 법에 대한 존경심보다 정의에 대한 존경심을 기르는 것이 바람직하다.<br><b>B:</b> 어떤 행위가 가져올 결과가 법을 준수했을 때의 결과보다 더 큰 이익을 사회 전체에 준다면 그 불복종은 정당하다.",
                o: ["A는 시민불복종의 정당성 근거를 사회적 유용성에서 찾는다.", "B는 불복종의 목적이 헌법적 원칙의 회복에 있다고 본다.", "A는 개인의 양심을, B는 공리의 원칙을 불복종의 판단 기준으로 삼는다.", "A, B 모두 불복종을 통해 국가 체제 자체를 전복해야 한다고 주장한다.", "A, B 모두 처벌의 감수가 불복종의 필수 조건이 아님을 강조한다."],
                a: 2,
                e: "A는 소로(양심), B는 싱어(공리)입니다. 소로는 양심을, 싱어는 공리(이익)를 중시합니다."
            },
            {
                q: "사회계약론자 홉스, 로크, 루소가 공통적으로 동의할 진술로 가장 적절한 것은?",
                o: ["국가는 개인의 자유를 억압하기 위해 존재하는 필요악이다.", "국가 권력의 정당성은 구성원들의 자발적 합의에서 비롯된다.", "주권은 인민에게 있으며, 정부는 언제나 교체 가능한 대리인일 뿐이다.", "자연 상태에서 인간은 타인과 평화로운 공존을 유지하는 사회적 존재이다.", "사회계약 이후 인간의 자연적 자유는 시민적 자유보다 언제나 우선한다."],
                a: 1,
                e: "세 학자 모두 '사회계약론'의 틀 안에서 국가 권력의 원천을 인민의 동의와 합의로 봅니다."
            },
            {
                q: "다음 사례에 대해 롤스(Rawls)가 조언할 내용으로 가장 적절한 것은?<br><br>현행법상 특정 소수 인종의 투표권을 실질적으로 제한하는 법안이 통과되었다. 이에 시민단체 갑은 해당 법의 폐지를 위해 평화적인 거리 행진을 계획하고 있다.",
                o: ["체제의 기반을 흔드는 혁명으로 전환하여 국가를 재건하십시오.", "다수의 정의감에 호소하여 헌법적 정의 원칙을 회복하도록 노력하십시오.", "이익 집단의 경제적 이익을 극대화하기 위한 전략적 행동을 취하십시오.", "개별적인 양심의 명령에만 따르고 다수의 의견은 완전히 무시하십시오.", "정의로운 법이 제정될 때까지 무기한으로 모든 납세를 거부하십시오."],
                a: 1,
                e: "롤스는 공유된 정의감에 호소하여 부당한 법을 교정하는 '안정성 수호'의 측면에서 시민불복종을 조언할 것입니다."
            }
        ];

        function loadQuiz() {
            const oxContainer = document.getElementById('ox-questions');
            oxData.forEach((item, index) => {
                oxContainer.innerHTML += `
                    <div class="p-5 border-2 border-slate-100 rounded-xl bg-white hover:border-indigo-200 transition-colors">
                        <p class="font-medium text-slate-700 mb-4 text-lg"><span class="text-indigo-600 font-bold mr-2">Q${index + 1}.</span> ${item.q}</p>
                        <div class="flex gap-8">
                            <label class="flex items-center gap-3 cursor-pointer group">
                                <input type="radio" name="ox-${index}" value="true" class="w-5 h-5 text-indigo-600 border-slate-300 focus:ring-indigo-500">
                                <span class="text-lg font-bold text-slate-500 group-hover:text-indigo-600">O (그렇다)</span>
                            </label>
                            <label class="flex items-center gap-3 cursor-pointer group">
                                <input type="radio" name="ox-${index}" value="false" class="w-5 h-5 text-indigo-600 border-slate-300 focus:ring-indigo-500">
                                <span class="text-lg font-bold text-slate-500 group-hover:text-indigo-600">X (아니다)</span>
                            </label>
                        </div>
                    </div>
                `;
            });

            const mcContainer = document.getElementById('mc-questions');
            mcData.forEach((item, index) => {
                let optionsHtml = item.o.map((opt, i) => `
                    <label class="choice-label flex items-start gap-4 p-4 border border-slate-200 rounded-xl cursor-pointer transition-all">
                        <input type="radio" name="mc-${index}" value="${i}" class="mt-1.5 w-4 h-4 text-indigo-600">
                        <span class="text-slate-700 leading-relaxed"><span class="font-bold mr-1">${i + 1}.</span> ${opt}</span>
                    </label>
                `).join('');

                mcContainer.innerHTML += `
                    <div class="p-6 border-2 border-slate-100 rounded-2xl bg-white shadow-sm">
                        <div class="mb-6">
                            <span class="text-indigo-600 font-black text-sm uppercase tracking-widest">Multiple Choice ${index + 11}</span>
                            <p class="text-lg font-bold text-slate-800 mt-2 leading-snug">${item.q}</p>
                        </div>
                        <div class="grid grid-cols-1 gap-3">${optionsHtml}</div>
                    </div>
                `;
            });
        }

        function submitQuiz() {
            let correctCount = 0;
            const totalQuestions = oxData.length + mcData.length;
            const reviewContainer = document.getElementById('review-section');
            reviewContainer.innerHTML = '<h3 class="text-xl font-bold mb-6 text-slate-800">문항별 상세 분석</h3>';

            // Grade OX
            oxData.forEach((item, index) => {
                const selected = document.querySelector(`input[name="ox-${index}"]:checked`);
                const isCorrect = selected && (selected.value === String(item.a));
                if (isCorrect) correctCount++;
                
                reviewContainer.innerHTML += `
                    <div class="p-5 rounded-xl border ${isCorrect ? 'bg-emerald-50 border-emerald-100' : 'bg-rose-50 border-rose-100'}">
                        <div class="flex items-center gap-2 mb-2">
                            <span class="${isCorrect ? 'bg-emerald-500' : 'bg-rose-500'} text-white text-xs px-2 py-0.5 rounded font-bold uppercase">Q${index + 1}</span>
                            <span class="font-bold ${isCorrect ? 'text-emerald-700' : 'text-rose-700'}">${isCorrect ? '정답입니다' : '오답입니다'}</span>
                        </div>
                        <p class="text-slate-600 text-sm mb-3">질문: ${item.q}</p>
                        <div class="bg-white/60 p-3 rounded-lg text-sm border border-slate-200">
                            <strong class="text-indigo-700">심화 해설:</strong> ${item.e}
                        </div>
                    </div>
                `;
            });

            // Grade MC
            mcData.forEach((item, index) => {
                const selected = document.querySelector(`input[name="mc-${index}"]:checked`);
                const isCorrect = selected && (parseInt(selected.value) === item.a);
                if (isCorrect) correctCount++;

                reviewContainer.innerHTML += `
                    <div class="p-5 rounded-xl border ${isCorrect ? 'bg-emerald-50 border-emerald-100' : 'bg-rose-50 border-rose-100'}">
                        <div class="flex items-center gap-2 mb-2">
                            <span class="${isCorrect ? 'bg-emerald-500' : 'bg-rose-500'} text-white text-xs px-2 py-0.5 rounded font-bold uppercase">Q${index + 11}</span>
                            <span class="font-bold ${isCorrect ? 'text-emerald-700' : 'text-rose-700'}">${isCorrect ? '정답입니다' : '오답입니다'}</span>
                        </div>
                        <div class="bg-white/60 p-3 rounded-lg text-sm border border-slate-200">
                            <strong class="text-indigo-700">심화 해설:</strong> ${item.e}
                        </div>
                    </div>
                `;
            });

            const score = Math.round((correctCount / totalQuestions) * 100);
            document.getElementById('score-display').innerText = `${score}점`;
            
            let grade = "";
            let comment = "";
            if (score === 100) { grade = "1등급 (만점)"; comment = "완벽합니다. 수능 시험장으로 바로 가셔도 되겠어요!"; }
            else if (score >= 90) { grade = "1등급"; comment = "사소한 실수만 잡으면 만점입니다. 킬러 선지를 정복하셨네요."; }
            else if (score >= 80) { grade = "2등급"; comment = "안정적인 성적입니다. 롤스와 루소의 차이점을 좀 더 복습해보세요."; }
            else if (score >= 60) { grade = "3-4등급"; comment = "핵심 개념은 알지만 함정에 빠지고 있습니다. 해설을 꼼꼼히 보세요."; }
            else { grade = "노력 요함"; comment = "기본 개념부터 차근차근 다시 정리해봅시다. 포기하지 마세요!"; }
            
            document.getElementById('grade-badge').innerText = grade;
            document.getElementById('grade-comment').innerText = comment;
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            window.scrollTo(0, 0);
        }

        function resetQuiz() {
            location.reload();
        }

        window.onload = loadQuiz;
    </script>
</body>
</html>
