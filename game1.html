<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>법이야, 정의야? - 시민 불복종 시뮬레이션</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        
        body {
            font-family: 'Pretendard', sans-serif;
            background: #f0f2f5;
            transition: background-color 1s ease;
            overflow-x: hidden;
        }

        .progress-bar {
            transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .choice-btn {
            transition: all 0.2s ease;
        }

        .choice-btn:hover {
            transform: translateY(-2px);
        }

        .quote-box {
            position: relative;
            padding-left: 1.5rem;
            border-left: 3px solid #cbd5e1;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="game-container" class="w-full max-w-2xl overflow-hidden relative">
        
        <!-- 시작 화면 -->
        <div id="screen-start" class="glass-card rounded-3xl shadow-2xl p-10 text-center animate__animated animate__fadeIn">
            <div class="mb-6 inline-block p-4 bg-blue-50 rounded-full">
                <span class="text-6xl">⚖️</span>
            </div>
            <h1 class="text-4xl font-extrabold text-gray-900 mb-4 tracking-tight">법이야, 정의야?</h1>
            <p class="text-gray-600 mb-8 leading-relaxed text-lg">
                국가는 질서를 위해 법을 만들지만,<br>
                때로는 그 법이 우리의 <strong>양심</strong>을 시험하기도 합니다.<br>
                당신은 어떤 길을 걷겠습니까?
            </p>
            <button onclick="startGame()" class="w-full sm:w-auto bg-gray-900 hover:bg-black text-white font-bold py-4 px-12 rounded-2xl shadow-xl transition-all transform hover:scale-105 active:scale-95">
                운명의 갈림길에 서기
            </button>
        </div>

        <!-- 게임 플레이 화면 -->
        <div id="screen-game" class="hidden animate__animated animate__fadeIn">
            <!-- 상단 스탯 카드 -->
            <div class="glass-card rounded-3xl shadow-xl mb-6 overflow-hidden">
                <div class="bg-gray-900 p-4 flex justify-between items-center">
                    <span class="text-gray-400 text-sm font-bold tracking-widest" id="turn-display">SITUATION 1 / 5</span>
                    <div class="flex space-x-2">
                        <div class="w-2 h-2 rounded-full bg-red-500"></div>
                        <div class="w-2 h-2 rounded-full bg-yellow-500"></div>
                        <div class="w-2 h-2 rounded-full bg-green-500"></div>
                    </div>
                </div>
                
                <div class="p-6 grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <div class="flex justify-between items-end">
                            <span class="text-sm font-bold text-blue-600 flex items-center gap-1">🏛️ 사회 질서</span>
                            <span id="order-val" class="text-xl font-black">80%</span>
                        </div>
                        <div class="h-4 w-full bg-gray-100 rounded-full p-1">
                            <div id="bar-order" class="h-full bg-blue-500 rounded-full progress-bar" style="width: 80%"></div>
                        </div>
                    </div>
                    <div class="space-y-2">
                        <div class="flex justify-between items-end">
                            <span class="text-sm font-bold text-red-500 flex items-center gap-1">❤️ 개인 양심</span>
                            <span id="conscience-val" class="text-xl font-black">80%</span>
                        </div>
                        <div class="h-4 w-full bg-gray-100 rounded-full p-1">
                            <div id="bar-conscience" class="h-full bg-red-500 rounded-full progress-bar" style="width: 80%"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 메인 이벤트 카드 -->
            <div class="glass-card rounded-3xl shadow-2xl p-8 mb-6 border-b-8 border-blue-500" id="event-card">
                <div class="flex items-start gap-4 mb-6">
                    <div class="bg-blue-100 p-3 rounded-2xl text-2xl" id="event-icon">📢</div>
                    <div>
                        <h2 class="text-xs font-black text-blue-500 uppercase tracking-widest mb-1">Current Situation</h2>
                        <p id="event-text" class="text-xl font-bold text-gray-800 leading-snug">사건 내용을 불러오는 중...</p>
                    </div>
                </div>

                <div id="choice-area" class="space-y-3">
                    <button onclick="makeChoice('obey')" class="choice-btn w-full text-left p-5 rounded-2xl border-2 border-gray-100 hover:border-blue-500 hover:bg-blue-50 transition-all flex justify-between items-center group">
                        <span id="btn-obey-text" class="font-bold text-gray-700 group-hover:text-blue-700">법을 준수합니다.</span>
                        <span class="text-blue-300 group-hover:translate-x-1 transition-transform">→</span>
                    </button>
                    <button onclick="makeChoice('disobey')" class="choice-btn w-full text-left p-5 rounded-2xl border-2 border-gray-100 hover:border-red-500 hover:bg-red-50 transition-all flex justify-between items-center group">
                        <span id="btn-disobey-text" class="font-bold text-gray-700 group-hover:text-red-700">불복종을 선택합니다.</span>
                        <span class="text-red-300 group-hover:translate-x-1 transition-transform">→</span>
                    </button>
                </div>

                <div id="feedback-area" class="hidden animate__animated animate__fadeInUp">
                    <div id="feedback-text" class="p-5 rounded-2xl bg-gray-50 border border-gray-200 text-gray-700 mb-6 italic leading-relaxed">
                        결과 메시지
                    </div>
                    <button onclick="nextTurn()" class="w-full bg-gray-900 text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-black transition-all">
                        다음 상황으로 이동
                    </button>
                </div>
            </div>
        </div>

        <!-- 결과 화면 -->
        <div id="screen-result" class="hidden glass-card rounded-3xl shadow-2xl p-8 text-center animate__animated animate__zoomIn">
            <div id="result-icon" class="text-6xl mb-4">🏆</div>
            <h1 id="result-title" class="text-3xl font-black mb-1">게임 종료</h1>
            <p id="result-subtitle" class="text-gray-500 font-bold mb-6 uppercase tracking-widest text-xs">최종 시민 등급 리포트</p>
            
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="bg-blue-50 p-3 rounded-2xl border border-blue-100">
                    <div class="text-[10px] font-bold text-blue-600 mb-1">최종 사회 질서</div>
                    <div class="text-xl font-black text-blue-900" id="final-order-val">80%</div>
                    <div class="w-full bg-blue-200 h-1 mt-1 rounded-full overflow-hidden">
                        <div id="final-order-bar" class="h-full bg-blue-600 progress-bar"></div>
                    </div>
                </div>
                <div class="bg-red-50 p-3 rounded-2xl border border-red-100">
                    <div class="text-[10px] font-bold text-red-600 mb-1">최종 개인 양심</div>
                    <div class="text-xl font-black text-red-900" id="final-conscience-val">80%</div>
                    <div class="w-full bg-red-200 h-1 mt-1 rounded-full overflow-hidden">
                        <div id="final-conscience-bar" class="h-full bg-red-600 progress-bar"></div>
                    </div>
                </div>
            </div>

            <div id="result-card" class="rounded-2xl p-6 mb-6 text-left border-l-8">
                <p id="result-desc" class="text-gray-700 leading-relaxed font-medium mb-4">
                    결과 내용을 분석 중입니다...
                </p>
                <div id="philosopher-quote" class="quote-box">
                    <p id="quote-text" class="text-sm italic text-gray-600 mb-1">"명언 내용"</p>
                    <p id="quote-author" class="text-xs font-bold text-gray-400 text-right">- 철학자 이름</p>
                </div>
            </div>

            <button onclick="location.reload()" class="bg-gray-900 hover:bg-black text-white font-bold py-4 px-10 rounded-2xl transition-all shadow-xl">
                다시 시도하기
            </button>
        </div>

    </div>

    <script>
        const events = [
            {
                icon: "💰",
                text: "정부가 독재 국가와의 전쟁을 위해 모든 시민에게 '전쟁 특별세'를 부과했습니다. 이 자금은 오직 무기 구입에만 사용됩니다.",
                obey: { text: "법에 따라 세금을 납부한다.", order: 15, conscience: -20, msg: "당신은 모범적인 납세자가 되었습니다. 국가 재정은 지켜졌지만, 누군가의 삶을 파괴하는 폭탄에 기여했다는 죄책감이 남습니다." },
                disobey: { text: "양심에 따라 납세를 거부한다.", order: -15, conscience: 20, msg: "세금 납부를 거부하며 평화의 가치를 지켰습니다. 정부의 독촉장이 날아오지만 당신의 마음은 당당합니다." }
            },
            {
                icon: "🚌",
                text: "특정 계층의 대중교통 이용 구역을 제한하는 '사회 격리법'이 제정되었습니다. 그들은 법적으로 뒷칸에만 타야 합니다.",
                obey: { text: "부당하지만 법을 준수한다.", order: 10, conscience: -25, msg: "법을 따름으로써 충돌을 피했습니다. 하지만 차별받는 이들의 눈빛을 피하며 당신의 정의감은 무너져 내립니다." },
                disobey: { text: "차별에 반대하며 앞칸에 함께 탄다.", order: -25, conscience: 25, msg: "연대를 선택했습니다! 버스 안에서 실랑이가 벌어지고 경찰이 출동했지만, 당신은 인간의 존엄성을 수호했습니다." }
            },
            {
                icon: "📖",
                text: "정부 비판 도서를 '불온 서적'으로 규정하고 압수 수색하는 법안이 통과되었습니다. 소지 자체만으로 처벌 대상입니다.",
                obey: { text: "보유한 책을 모두 제출한다.", order: 15, conscience: -20, msg: "지식의 검열에 순응했습니다. 사회는 조용해졌지만, 비판의 목소리가 사라진 도시는 생동감을 잃어갑니다." },
                disobey: { text: "금서를 숨기고 몰래 공유한다.", order: -20, conscience: 20, msg: "지혜의 불꽃을 지켰습니다. 수사망이 좁혀오지만, 당신의 행동은 누군가에게 진실을 볼 기회를 주었습니다." }
            },
            {
                icon: "🏠",
                text: "대규모 개발을 위해 빈민촌 주민들을 강제 퇴거시키라는 행정 명령이 떨어졌습니다. 갈 곳 없는 이들이 저항 중입니다.",
                obey: { text: "적법한 절차이므로 개입하지 않는다.", order: 15, conscience: -25, msg: "법 집행을 방해하지 않았습니다. 신도시는 지어지겠지만, 쫓겨난 이웃들의 절규는 당신의 양심에 영원히 남을 것입니다." },
                disobey: { text: "주민들과 함께 철거를 막아선다.", order: -25, conscience: 20, msg: "약자의 방패가 되었습니다. 공무집행 방해로 연행될 위기에 처했지만, 생존권이 개발보다 우선임을 선포했습니다." }
            },
            {
                icon: "✊",
                text: "권력 유지를 위한 헌법 개정안이 선포되었습니다. 이에 항의하는 모든 집회는 즉각 '불법'으로 간주됩니다.",
                obey: { text: "불법 집회이므로 참여하지 않는다.", order: 10, conscience: -30, msg: "안전을 지키고 법을 어기지 않았습니다. 하지만 독재가 뿌리내리는 것을 지켜보는 고통은 갈수록 커져만 갑니다." },
                disobey: { text: "법을 어기고 광장 시위에 참여한다.", order: -30, conscience: 30, msg: "자유를 위해 금지된 선을 넘었습니다! 거대한 공권력과 대치하며 질서는 마비되었지만, 민주주의의 희망이 타오릅니다." }
            }
        ];

        let state = { order: 80, conscience: 80, index: 0, gameOver: false };

        const elements = {
            screenStart: document.getElementById('screen-start'),
            screenGame: document.getElementById('screen-game'),
            screenResult: document.getElementById('screen-result'),
            barOrder: document.getElementById('bar-order'),
            barConscience: document.getElementById('bar-conscience'),
            valOrder: document.getElementById('order-val'),
            valConscience: document.getElementById('conscience-val'),
            eventIcon: document.getElementById('event-icon'),
            eventText: document.getElementById('event-text'),
            choiceArea: document.getElementById('choice-area'),
            feedbackArea: document.getElementById('feedback-area'),
            feedbackText: document.getElementById('feedback-text'),
            turnDisplay: document.getElementById('turn-display')
        };

        function startGame() {
            elements.screenStart.classList.add('hidden');
            elements.screenGame.classList.remove('hidden');
            loadEvent();
        }

        function loadEvent() {
            const ev = events[state.index];
            elements.turnDisplay.innerText = `SITUATION ${state.index + 1} / ${events.length}`;
            elements.eventIcon.innerText = ev.icon;
            elements.eventText.innerText = ev.text;
            document.getElementById('btn-obey-text').innerText = ev.obey.text;
            document.getElementById('btn-disobey-text').innerText = ev.disobey.text;
            elements.choiceArea.classList.remove('hidden');
            elements.feedbackArea.classList.add('hidden');
            updateBackground();
        }

        function makeChoice(type) {
            const ev = events[state.index];
            const choice = type === 'obey' ? ev.obey : ev.disobey;
            state.order = Math.max(0, Math.min(100, state.order + choice.order));
            state.conscience = Math.max(0, Math.min(100, state.conscience + choice.conscience));
            updateUI();
            elements.feedbackText.innerHTML = choice.msg;
            elements.choiceArea.classList.add('hidden');
            elements.feedbackArea.classList.remove('hidden');
            checkEndConditions();
        }

        function updateUI() {
            elements.barOrder.style.width = `${state.order}%`;
            elements.valOrder.innerText = `${state.order}%`;
            elements.barConscience.style.width = `${state.conscience}%`;
            elements.valConscience.innerText = `${state.conscience}%`;
            elements.barOrder.className = state.order < 30 ? "h-full bg-red-600 rounded-full progress-bar" : (state.order < 60 ? "h-full bg-yellow-500 rounded-full progress-bar" : "h-full bg-blue-500 rounded-full progress-bar");
            elements.barConscience.className = state.conscience < 30 ? "h-full bg-gray-600 rounded-full progress-bar" : "h-full bg-red-500 rounded-full progress-bar";
        }

        function updateBackground() {
            const hue = 210 - (80 - state.order) * 2.5; 
            document.body.style.backgroundColor = `hsl(${hue}, 20%, 95%)`;
        }

        function nextTurn() {
            if(state.gameOver) return;
            state.index++;
            if(state.index >= events.length) showResult('clear');
            else loadEvent();
        }

        function checkEndConditions() {
            if (state.order <= 0) { state.gameOver = true; setTimeout(() => showResult('anarchy'), 800); }
            else if (state.conscience <= 0) { state.gameOver = true; setTimeout(() => showResult('machine'), 800); }
        }

        function showResult(type) {
            elements.screenGame.classList.add('hidden');
            elements.screenResult.classList.remove('hidden');
            
            document.getElementById('final-order-val').innerText = `${state.order}%`;
            document.getElementById('final-conscience-val').innerText = `${state.conscience}%`;
            document.getElementById('final-order-bar').style.width = `${state.order}%`;
            document.getElementById('final-conscience-bar').style.width = `${state.conscience}%`;

            const icon = document.getElementById('result-icon');
            const title = document.getElementById('result-title');
            const desc = document.getElementById('result-desc');
            const card = document.getElementById('result-card');
            const quoteText = document.getElementById('quote-text');
            const quoteAuthor = document.getElementById('quote-author');

            let ending = {};

            if (type === 'anarchy') {
                ending = {
                    icon: "🔥", title: "질서의 파괴자", color: "border-red-600 bg-red-50",
                    text: "당신은 정의만을 쫓았지만 사회를 지탱하는 최소한의 틀마저 무너뜨렸습니다. 정의 없는 질서도 문제지만, 질서 없는 정의는 혼란만을 야기합니다.",
                    quote: "시민 불복종은 법에 대한 충성심의 한계 내에서 법에 반대하는 행위이다.",
                    author: "존 롤스 (John Rawls)"
                };
            } else if (type === 'machine') {
                ending = {
                    icon: "🤖", title: "침묵하는 부역자", color: "border-gray-800 bg-gray-100",
                    text: "법이라는 껍데기에 집착하여 가장 소중한 인간의 양심을 버렸습니다. 당신의 침묵이 거대한 불의의 기둥이 되었음을 잊지 마세요.",
                    quote: "우리는 먼저 인간이어야 하고, 그다음에 국민이어야 한다.",
                    author: "헨리 데이비드 소로 (H. D. Thoreau)"
                };
            } else {
                if (state.conscience >= 80 && state.order >= 50) {
                    ending = {
                        icon: "🕊️", title: "성숙한 개혁가", color: "border-green-500 bg-green-50",
                        text: "훌륭합니다! 당신은 사회의 공익과 정의 사이에서 정교한 균형을 잡았습니다. 당신의 행동은 공동체 전체를 더 나은 방향으로 인도합니다.",
                        quote: "불복종이 산출할 이익이 그로 인한 해악보다 클 때 불복종은 정당화된다.",
                        author: "피터 싱어 (Peter Singer)"
                    };
                } else if (state.conscience >= 70 && state.order < 50) {
                    ending = {
                        icon: "🧨", title: "급진적 혁명가", color: "border-orange-500 bg-orange-50",
                        text: "당신은 타협을 거부하고 정의의 불꽃을 선택했습니다. 비록 법적 대가는 크겠지만, 당신의 용기는 부당한 권력을 뒤흔드는 망치가 될 것입니다.",
                        quote: "부당한 법이 존재한다면, 우리는 그것을 그냥 따를 것인가 아니면 즉시 어길 것인가?",
                        author: "헨리 데이비드 소로 (H. D. Thoreau)"
                    };
                } else if (state.conscience < 50 && state.order >= 70) {
                    ending = {
                        icon: "🛡️", title: "안정 지향적 시민", color: "border-blue-400 bg-blue-50",
                        text: "당신은 안정적인 사회 유지를 최우선 가치로 삼았습니다. 하지만 가끔은 시스템의 오류를 바로잡기 위해 위험을 감수하는 용기가 필요할 때가 있습니다.",
                        quote: "불복종은 법에 대한 불경계가 아니라, 헌법 정신에 대한 깊은 존중이다.",
                        author: "존 롤스 (John Rawls)"
                    };
                } else {
                    ending = {
                        icon: "🌫️", title: "고뇌하는 관찰자", color: "border-purple-400 bg-purple-50",
                        text: "어떤 길도 확신할 수 없었기에 당신은 늘 망설였습니다. 그러나 그 갈등과 고민 자체가 민주주의 시민으로서 가져야 할 최소한의 예의일 것입니다.",
                        quote: "다수의 의견이라 해서 항상 옳은 것은 아니며, 양심에는 다수결의 원칙이 적용되지 않는다.",
                        author: "마하트마 간디 (Mahatma Gandhi)"
                    };
                }
            }

            icon.innerText = ending.icon;
            title.innerText = ending.title;
            desc.innerHTML = ending.text;
            quoteText.innerText = `"${ending.quote}"`;
            quoteAuthor.innerText = `- ${ending.author}`;
            card.className = `rounded-2xl p-6 mb-6 text-left border-l-8 ${ending.color}`;
        }
    </script>
</body>
</html>
