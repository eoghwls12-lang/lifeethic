<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>생활과 윤리: 사례로 배우는 과기윤 챌린지</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f1f5f9; }
        .card-anim { transition: all 0.2s ease-out; }
        .correct-flash { animation: correct-bg 0.5s ease; }
        @keyframes correct-bg { 0%, 100% { background-color: white; } 50% { background-color: #dcfce7; } }
        .wrong-shake { animation: shake 0.4s ease-in-out; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
    </style>
</head>
<body class="p-4 md:p-6">
    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <div class="bg-white rounded-3xl p-6 mb-6 shadow-md border border-slate-200">
            <h1 class="text-2xl md:text-3xl font-black text-slate-800 mb-2 text-center">🔬 과기윤 사례 랜덤 챌린지</h1>
            <p class="text-slate-500 text-center text-sm">50개의 사례 중 랜덤 10문제가 출제됩니다. (100점 만점)</p>
            <div class="flex justify-around mt-4 border-t pt-4">
                <div class="text-center">
                    <p class="text-[10px] text-slate-400 uppercase font-bold tracking-widest">진행도</p>
                    <p class="text-xl font-black text-blue-600"><span id="current-count">0</span> / 10</p>
                </div>
                <div class="text-center">
                    <p class="text-[10px] text-slate-400 uppercase font-bold tracking-widest">현재 점수</p>
                    <p class="text-xl font-black text-emerald-600"><span id="score">0</span>점</p>
                </div>
            </div>
        </div>

        <!-- Game Area -->
        <div id="game-view" class="space-y-6">
            <!-- Case Study Card -->
            <div id="case-card" class="bg-white p-6 md:p-8 rounded-3xl shadow-xl border border-slate-100 card-anim min-h-[180px] flex flex-col justify-center relative overflow-hidden text-center">
                <div class="absolute top-0 left-0 w-2 h-full bg-indigo-600"></div>
                <p id="case-text" class="text-lg md:text-xl font-medium text-slate-700 leading-relaxed italic">
                    사례를 불러오는 중...
                </p>
            </div>

            <!-- Bin Buttons -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <button onclick="checkAnswer(0)" class="flex flex-col items-center justify-center p-5 bg-white border-2 border-slate-100 rounded-2xl hover:border-blue-500 hover:bg-blue-50 transition-all group">
                    <span class="text-3xl mb-2">📏</span>
                    <span class="font-bold text-slate-800">가치 중립설 (야스퍼스)</span>
                    <span class="text-xs text-slate-400 mt-1 text-center">도구적 관점 / 정당화의 과정 / 객관적 검증</span>
                </button>
                <button onclick="checkAnswer(1)" class="flex flex-col items-center justify-center p-5 bg-white border-2 border-slate-100 rounded-2xl hover:border-amber-500 hover:bg-amber-50 transition-all group">
                    <span class="text-3xl mb-2">💡</span>
                    <span class="font-bold text-slate-800">가치 개입설 (하이데거 등)</span>
                    <span class="text-xs text-slate-400 mt-1 text-center">발견 및 활용의 과정 / 사회적 책임</span>
                </button>
                <button onclick="checkAnswer(2)" class="flex flex-col items-center justify-center p-5 bg-white border-2 border-slate-100 rounded-2xl hover:border-emerald-500 hover:bg-emerald-50 transition-all group">
                    <span class="text-3xl mb-2">🛡️</span>
                    <span class="font-bold text-slate-800">요나스의 책임 윤리</span>
                    <span class="text-xs text-slate-400 mt-1 text-center">공포의 발견 / 인류 존속 / 비대칭적 책임</span>
                </button>
                <button onclick="checkAnswer(3)" class="flex flex-col items-center justify-center p-5 bg-white border-2 border-slate-100 rounded-2xl hover:border-purple-500 hover:bg-purple-50 transition-all group">
                    <span class="text-3xl mb-2">📱</span>
                    <span class="font-bold text-slate-800">정보 및 매체 윤리</span>
                    <span class="text-xs text-slate-400 mt-1 text-center">잊힐 권리 / 리터러시 / 사생활 보호</span>
                </button>
            </div>
        </div>

        <!-- Explanation Modal -->
        <div id="explanation-modal" class="hidden fixed inset-0 bg-slate-900/60 flex items-center justify-center p-4 z-50">
            <div class="bg-white rounded-3xl p-6 md:p-8 max-w-lg w-full shadow-2xl">
                <div id="modal-icon" class="text-4xl mb-4 text-center"></div>
                <h3 id="modal-title" class="text-2xl font-black mb-2 text-center"></h3>
                <div class="bg-slate-50 p-4 rounded-xl mb-6">
                    <p id="modal-desc" class="text-slate-600 leading-relaxed"></p>
                </div>
                <button onclick="nextQuestion()" class="w-full bg-slate-800 text-white py-4 rounded-2xl font-bold hover:bg-slate-700 transition-all shadow-lg">다음 문제로</button>
            </div>
        </div>

        <!-- Result View -->
        <div id="result-view" class="hidden bg-white rounded-3xl p-10 shadow-xl text-center border border-slate-200">
            <div class="text-6xl mb-4">🏆</div>
            <h2 class="text-3xl font-black text-slate-800 mb-2">미션 완료!</h2>
            <p class="text-slate-500 mb-8">매 판마다 새로운 문제가 나옵니다. 다시 도전해보세요!</p>
            <div class="text-7xl font-black text-indigo-600 mb-8"><span id="final-score">0</span><span class="text-3xl text-slate-400">점</span></div>
            <button onclick="location.reload()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold hover:bg-indigo-700 transition-all">새로운 문제로 다시 시작</button>
        </div>
    </div>

    <script>
        const conceptData = [
            // 0: 가치 중립설, 1: 가치 개입설, 2: 요나스, 3: 정보/매체 윤리
            { case: "물리학자 A는 실험 데이터가 자신의 가설과 맞지 않음에도 불구하고 수치를 조작하지 않고 그대로 발표했다.", category: 0, explanation: "객관적 타당성을 확보하기 위해 주관적 가치를 배제하는 '정당화의 과정'에 해당합니다." },
            { case: "어느 IT 기업은 인공지능 면접 시스템이 남성에게 유리한 편향성을 갖는 것을 확인하고 개발을 전면 재검토했다.", category: 1, explanation: "기술의 사회적 부작용을 고려하여 연구 방향을 설정하는 것은 '발견 및 활용 과정'에서의 가치 개입입니다." },
            { case: "환경 운동가 B는 '우리가 현재 누리는 풍요가 미래 세대의 생존 가능성을 파괴해서는 안 된다'고 주장하며 서명 운동을 벌였다.", category: 2, explanation: "인류의 영속적 생존과 미래 세대에 대한 책임을 강조하는 요나스의 정언 명령에 해당합니다." },
            { case: "C씨는 포털 사이트에 자신의 과거 파산 경력이 담긴 기사가 현재의 정상적인 경제 활동을 방해한다며 삭제를 요청했다.", category: 3, explanation: "개인이 온라인상에서 자신에 관한 정보가 더 이상 유통되지 않도록 요구하는 '잊힐 권리'의 사례입니다." },
            { case: "과학자 D는 '원자력은 그 자체로 선하지도 악하지도 않으며, 그것을 폭탄으로 쓸지 발전소로 쓸지는 정치가의 몫'이라고 보았다.", category: 0, explanation: "기술을 인간의 목적을 위한 단순한 도구로 보는 야스퍼스의 가치 중립설 입장입니다." },
            { case: "정부는 유전자 편집 기술이 인류의 질병 치료에 획기적이지만 생명 윤리를 파괴할 위험이 크다고 판단해 연구 범위를 법으로 제한했다.", category: 1, explanation: "사회적 합의와 가치 판단에 기초하여 기술의 활용 범위를 결정하는 가치 개입적 사례입니다." },
            { case: "윤리학자 E는 '기술의 긍정적 미래보다는 최악의 상황을 먼저 상상하여 예방 조치를 취해야 한다'고 주장했다.", category: 2, explanation: "요나스가 주장한 '공포의 발견(부정적 예견의 우선순위)' 원칙에 해당합니다." },
            { case: "중학생 F군은 유튜브 뉴스를 보고 해당 채널의 운영 주체와 광고 목적을 확인하며 정보의 신뢰도를 직접 검증했다.", category: 3, explanation: "매체 정보를 비판적으로 이해하고 분석하는 능력인 '디지털 리터러시'를 실천하는 모습입니다." },
            { case: "생물학 보고서에서 가설 검증 과정의 논리적 모순이 없는지 동료 과학자들이 객관적으로 검토하는 단계를 거쳤다.", category: 0, explanation: "과학적 지식이 타당한지를 논리적으로 검토하는 '정당화의 과정'은 가치 중립의 영역입니다." },
            { case: "하이데거는 '기술을 단순한 도구로만 보는 태도가 인간을 기술의 부품으로 전락시키는 가장 큰 위협'이라고 경고했다.", category: 1, explanation: "기술의 가치 중립적 태도를 비판하며 기술이 갖는 가치 지향적 성격을 강조한 관점입니다." },
            // ... (중략 - 50문제 구성을 위해 사례 계속 추가)
            { case: "과거의 잘못된 범죄 기록이 갱생한 인물의 사회 복귀를 영구적으로 막는다면, 해당 정보의 검색 차단이 필요하다는 주장이 제기되었다.", category: 3, explanation: "인격권 보호를 위해 과거 정보의 삭제를 요구하는 '잊힐 권리'와 관련된 쟁점입니다." },
            { case: "요나스는 '인간만이 책임을 질 수 있는 능력이 있으므로 자연에 대해 일방적인 책임을 져야 한다'고 보았다.", category: 2, explanation: "능력이 책임의 근거가 된다고 보는 요나스의 '비대칭적 책임'에 대한 설명입니다." },
            { case: "어느 연구소는 인구 고령화 문제를 해결하기 위해 노인 보조 로봇 개발을 최우선 연구 과제로 선정했다.", category: 1, explanation: "사회적 필요와 목적에 따라 연구 주제를 정하는 '발견의 과정'은 가치가 개입되는 단계입니다." },
            { case: "실험 결과가 기존 학계의 정설과 다르더라도 관찰된 사실만을 논문에 기재하는 것은 과학자의 기본 윤리이다.", category: 0, explanation: "객관적 사실 확인과 데이터 검증(정당화 과정)에서는 개인의 가치관이 배제되어야 합니다." },
            { case: "정부는 미세먼지 저감 기술 개발에 예산을 집중 투입하여 국민의 건강권을 보호하기로 결정했다.", category: 1, explanation: "공익적 가치를 실현하기 위해 기술을 활용하는 단계는 가치 개입의 영역입니다." },
            { case: "책임 윤리에서는 '현재 인간의 행위가 미래에도 인간이 살 수 있는 조건과 조화를 이루어야 한다'고 명령한다.", category: 2, explanation: "미래 세대의 생존 조건을 보장해야 한다는 요나스의 책임 윤리 원칙입니다." },
            { case: "인터넷 게시판에 타인의 창작물을 무단으로 게시하는 행위는 창작자의 권리를 침해하는 비윤리적 행동이다.", category: 3, explanation: "정보 사회에서 지식 재산권(저작권) 보호의 중요성을 강조하는 사례입니다." },
            { case: "수학적 공식을 사용하여 기후 변화 모델의 오차 범위를 계산하는 과정은 연구자의 정치적 성향과 무관해야 한다.", category: 0, explanation: "논리적, 수학적 검증 단계(정당화 과정)는 주관적 가치가 개입되지 않는 중립적 과정입니다." },
            { case: "공상과학 영화는 인공지능이 반란을 일으키는 암울한 미래를 보여줌으로써 현재의 인공지능 개발에 경종을 울린다.", category: 2, explanation: "최악의 시나리오를 통해 책임을 일깨우는 요나스의 '공포의 발견'과 맥을 같이 합니다." },
            { case: "대중 매체의 자극적인 보도 뒤에 숨겨진 상업적 의도를 파악하고 정보를 선별적으로 수용하는 태도가 요구된다.", category: 3, explanation: "정보의 생산과 유통 과정을 이해하는 '매체 리터러시'에 관한 설명입니다." },
            // (사례 추가)
            { case: "화학자 G는 자신이 발견한 신물질이 독가스 제조에 쓰일 것을 우려하여 상세 제조법 공개를 거부했다.", category: 1, explanation: "연구 결과가 사회에 미칠 해악을 고려하여 활용을 제한하는 것은 가치 개입적 책임 의식입니다." },
            { case: "야스퍼스는 '기술은 목적을 위한 수단이며, 그 자체로는 선도 악도 아닌 중립적 존재'라고 명시했다.", category: 0, explanation: "가치 중립설의 핵심 정의로, 기술의 도구적 성격을 명확히 표현한 문장입니다." },
            { case: "기후 위기 대응 기술은 현세대보다 아직 태어나지 않은 미래 인류를 위해 더 절실하다는 도덕적 공감대가 형성되었다.", category: 2, explanation: "책임의 범위를 미래 세대까지 확장한 요나스의 윤리관을 반영합니다." },
            { case: "SNS에서 허위 정보를 유포하여 타인의 명예를 훼손하는 행위는 표현의 자유를 넘어선 범죄로 간주된다.", category: 3, explanation: "정보 사회에서 타인의 인격권을 존중해야 하는 매체 윤리에 관한 사례입니다." },
            { case: "천문학 데이터 분석 소프트웨어가 별의 궤도를 계산하는 방식은 천문학자의 종교적 가치관에 영향을 받지 않는다.", category: 0, explanation: "데이터를 처리하고 정당화하는 논리적 과정은 가치 중립적이어야 합니다." },
            { case: "자율주행 자동차 사고 발생 시 책임 소재를 가리기 위해 인공지능 윤리 가이드라인을 제정했다.", category: 1, explanation: "새로운 기술의 도입과 운영에 대한 가치 판단과 법적 기준 마련은 가치 개입의 과정입니다." },
            { case: "요나스는 '인간은 인간다운 삶을 지속해야 할 도덕적 의무가 있으며, 자연은 그 터전으로서 보호받아야 한다'고 보았다.", category: 2, explanation: "인간의 존속과 자연 보호를 책임의 핵심 내용으로 보는 관점입니다." },
            { case: "개인의 위치 정보를 실시간으로 추적하는 앱은 편리함을 주지만, 전자 판옵티콘과 같은 감시 사회의 위협이 되기도 한다.", category: 3, explanation: "정보 기술로 인한 사생활 침해 및 사회적 감시 문제를 지적하는 사례입니다." },
            { case: "신약 개발 과정에서 임상 시험 결과의 유효성을 통계학적으로 증명하는 단계는 연구자의 개인적 소망과 분리되어야 한다.", category: 0, explanation: "객관적 정당화의 과정은 가치 중립이 지켜져야 하는 영역입니다." },
            { case: "과학 기술의 비약적 발전이 오히려 인간의 주체성을 약화시키고 기술에 종속되게 만드는 '비인간화' 현상이 나타났다.", category: 1, explanation: "기술의 사회적 영향력을 비판적으로 바라보는 가치 개입적 시각입니다." },
            { case: "환경 단체는 멸종 위기종의 보호가 인간의 경제적 이익보다 우선되어야 한다는 가치를 내세워 개발을 저지했다.", category: 2, explanation: "인간 중심주의를 넘어 자연에 대한 책임을 강조하는 요나스의 정신과 연결됩니다." },
            { case: "디지털 기기를 사용하여 정보를 생산할 때 타인의 권리를 침해하지 않도록 예절을 지키는 '네티켓'이 강조된다.", category: 3, explanation: "정보 통신 윤리의 기본 수칙에 관한 사례입니다." },
            { case: "야스퍼스에 따르면 과학 기술은 사용자가 어떤 의도로 사용하느냐에 따라 그 가치가 결정되는 도구일 뿐이다.", category: 0, explanation: "기술의 본질을 가치 중립적인 도구로 파악하는 야스퍼스의 입장입니다." },
            { case: "과학자가 생화학 무기 연구를 거부하는 이유는 자신의 연구가 인류를 살상하는 데 쓰이는 것을 용납할 수 없기 때문이다.", category: 1, explanation: "연구 활용의 결과에 대해 책임을 느끼고 가치 판단을 내리는 가치 개입적 태도입니다." },
            { case: "미래의 인류가 살 수 없는 환경을 만드는 것은 현세대가 미래 세대의 생존권을 약탈하는 도덕적 범죄이다.", category: 2, explanation: "미래 세대에 대한 현세대의 책임 의무를 강조하는 요나스의 윤리입니다." },
            { case: "익명성을 악용하여 사이버 불링을 가하는 행위는 피해자에게 심각한 정신적 고통을 주는 정보 사회의 역기능이다.", category: 3, explanation: "정보 매체 이용 과정에서 발생하는 윤리적 문제와 매체 윤리의 필요성을 보여줍니다." },
            { case: "연구 보고서의 참고 문헌을 명확히 밝히고 다른 학자의 아이디어를 자신의 것인 양 속이지 않는 것은 학문의 기본이다.", category: 0, explanation: "학문적 정직성과 정당화 과정에서의 객관적 절차 준수에 해당합니다." },
            { case: "과학 기술 지상주의는 모든 사회 문제를 기술로 해결할 수 있다고 믿으며 윤리적 성찰을 소홀히 할 위험이 있다.", category: 1, explanation: "기술에 대한 무조건적 맹신을 경계하고 가치 판단의 중요성을 역설하는 관점입니다." },
            { case: "요나스는 '공포'가 우리에게 무엇을 보호해야 할지 알려주는 도덕적 길잡이가 될 수 있다고 보았다.", category: 2, explanation: "부정적 미래에 대한 공포가 역설적으로 책임감을 일깨운다는 '공포의 발견' 개념입니다." },
            { case: "정보 소외 계층에게 스마트 기기를 보급하고 교육을 제공하여 디지털 격차를 해소하려는 정책이 시행되었다.", category: 3, explanation: "정보 공유와 평등의 가치를 실현하려는 정보 윤리적 노력입니다." },
            { case: "실험실의 온도와 습도를 일정하게 유지하여 외부 요인이 실험 결과에 미치는 영향을 차단하는 것은 객관적 검증의 일부다.", category: 0, explanation: "실험의 정확도와 정당성을 확보하려는 중립적 연구 과정입니다." },
            { case: "하이데거는 '현대 기술이 자연을 단순히 에너지원으로만 보게 함으로써 존재의 진실을 가린다'고 비판했다.", category: 1, explanation: "기술이 인간의 사고방식에 미치는 영향을 비판적으로 고찰하는 가치 개입적 철학입니다." },
            { case: "책임 윤리에 따르면 인간은 행위의 의도뿐만 아니라 예견할 수 없었던 결과에 대해서도 책임을 져야 할 수도 있다.", category: 2, explanation: "책임의 범위를 행위 결과의 예측 범위까지 넓히는 요나스의 관점을 포함합니다." },
            { case: "검색 엔진에서 특정 개인의 과거 사생활과 관련된 링크가 검색되지 않도록 기술적 조치를 취하는 사례가 늘고 있다.", category: 3, explanation: "잊힐 권리를 실질적으로 보장하기 위한 정보 윤리적 조치입니다." },
            { case: "보고서의 결론이 후원 기업의 이익에 반하더라도 관찰된 수치를 그대로 기술하는 것이 과학자의 정직성이다.", category: 0, explanation: "외부의 압력이나 가치 개입 없이 객관적 진실(정당화 과정)을 수호하는 자세입니다." },
            { case: "어느 국가는 로봇에게 인격을 부여할지 여부를 결정하기 위해 대대적인 공청회와 윤리적 심의를 거쳤다.", category: 1, explanation: "새로운 기술적 존재에 대한 사회적 정의와 가치 부여는 가치 개입의 문제입니다." },
            { case: "요나스의 정언 명령은 '너의 행위의 결과가 지구상에서 인류의 존속과 조화를 이루도록 하라'는 것이다.", category: 2, explanation: "인류 전체의 생존을 도덕적 행위의 절대적 기준으로 삼는 요나스의 핵심 사상입니다." },
            { case: "매체 비판 교육은 학생들이 광고와 기사를 구분하고 정보의 숨은 의도를 파악하는 능력을 기르는 데 중점을 둔다.", category: 3, explanation: "매체 환경에 능동적으로 대처하는 '매체 리터러시' 교육의 목표입니다." },
            { case: "과학 법칙을 발견하는 과정에서 얻어진 수식을 수학적으로 증명하는 단계는 문화적 배경에 관계없이 동일해야 한다.", category: 0, explanation: "보편적이고 객관적인 정당화의 과정은 가치 중립적 특성을 갖습니다." },
            { case: "인공지능이 창작한 그림을 공공재로 보아 누구나 자유롭게 이용하게 할지, 개발자의 권리로 보호할지는 사회적 선택의 문제다.", category: 1, explanation: "기술의 산물에 대한 가치 부여와 법적 활용 결정은 가치 개입의 영역입니다." }
        ];

        let currentIdx = 0;
        let score = 0;
        let shuffledData = [];

        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function initGame() {
            // 50문제 중 랜덤 10문제 추출
            shuffledData = shuffle([...conceptData]).slice(0, 10);
            currentIdx = 0;
            score = 0;
            updateStats();
            document.getElementById('game-view').classList.remove('hidden');
            document.getElementById('result-view').classList.add('hidden');
            showCase();
        }

        function showCase() {
            const card = document.getElementById('case-card');
            const caseText = document.getElementById('case-text');
            caseText.innerText = shuffledData[currentIdx].case;
            
            // 시각적 효과
            card.classList.remove('opacity-0');
            card.style.transform = "translateY(0)";
        }

        function checkAnswer(choice) {
            const correct = shuffledData[currentIdx].category;
            const modal = document.getElementById('explanation-modal');
            const icon = document.getElementById('modal-icon');
            const title = document.getElementById('modal-title');
            const desc = document.getElementById('modal-desc');

            if (choice === correct) {
                score += 10;
                icon.innerText = "✅";
                title.innerText = "정답입니다!";
                title.className = "text-2xl font-black mb-2 text-center text-emerald-600";
            } else {
                icon.innerText = "❌";
                title.innerText = "아쉬워요!";
                title.className = "text-2xl font-black mb-2 text-center text-red-600";
                document.getElementById('case-card').classList.add('wrong-shake');
                setTimeout(() => document.getElementById('case-card').classList.remove('wrong-shake'), 400);
            }

            desc.innerText = shuffledData[currentIdx].explanation;
            modal.classList.remove('hidden');
            updateStats();
        }

        function nextQuestion() {
            document.getElementById('explanation-modal').classList.add('hidden');
            currentIdx++;
            if (currentIdx < 10) {
                showCase();
                updateStats();
            } else {
                finishGame();
            }
        }

        function updateStats() {
            document.getElementById('current-count').innerText = Math.min(currentIdx + 1, 10);
            document.getElementById('score').innerText = score;
        }

        function finishGame() {
            document.getElementById('game-view').classList.add('hidden');
            document.getElementById('result-view').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
        }

        window.onload = initGame;
    </script>
</body>
</html>
